name: desktop_tools_flutter
description: Desktop tools refactored to Flutter cross-platform app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_local_notifications: ^17.2.4
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.5
  sqflite_common_ffi_web: ^1.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  math_expressions: ^2.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/holidays/holidays_2025_2026.json
